services:
  frontend:
    build:
      context: https://github.com/Adamsol1/MCP-project.git#feature_docker
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: https://github.com/Adamsol1/MCP-project.git#feature_docker
      dockerfile: docker/backend.Dockerfile
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:?Set GEMINI_API_KEY in Portainer}
      LLM_PROVIDER: ${LLM_PROVIDER:-local}
      LLM_BASE_URL: ${LLM_BASE_URL:?Set LLM_BASE_URL in Portainer}
      LLM_MODEL: ${LLM_MODEL:?Set LLM_MODEL in Portainer}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_ENABLE_THINKING: ${LLM_ENABLE_THINKING:-false}
      MCP_SERVER_URL: http://generation-mcp:8001/sse
      REVIEW_MCP_URL: http://review-mcp:8002/sse
      COUNCIL_MCP_URL: http://council-mcp:8003/sse
      COUNCIL_MCP_AUTOSTART: "0"
      SESSIONS_DB_PATH: /app/backend/data/sessions.db
      KNOWLEDGE_DB_PATH: /app/backend/data/knowledge.db
    volumes:
      - backend_data:/app/backend/data
    depends_on:
      - generation-mcp
      - review-mcp
      - council-mcp
    restart: unless-stopped

  generation-mcp:
    build:
      context: https://github.com/Adamsol1/MCP-project.git#feature_docker
      dockerfile: docker/generation-mcp.Dockerfile
    environment:
      OTX_API_KEY: ${OTX_API_KEY:?Set OTX_API_KEY in Portainer}
      SERPER_API_KEY: ${SERPER_API_KEY:?Set SERPER_API_KEY in Portainer}
      SESSIONS_DB_PATH: /app/backend/data/sessions.db
      KNOWLEDGE_DB_PATH: /app/backend/data/knowledge.db
      MCP_UPLOADS_DIR: /app/backend/data/mcp_uploads
    volumes:
      - backend_data:/app/backend/data
    restart: unless-stopped

  review-mcp:
    build:
      context: https://github.com/Adamsol1/MCP-project.git#feature_docker
      dockerfile: docker/review-mcp.Dockerfile
    restart: unless-stopped

  council-mcp:
    build:
      context: https://github.com/Adamsol1/MCP-project.git#feature_docker
      dockerfile: docker/council-mcp.Dockerfile
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:?Set GEMINI_API_KEY in Portainer}
      LLM_BASE_URL: ${LLM_BASE_URL:?Set LLM_BASE_URL in Portainer}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_ENABLE_THINKING: ${LLM_ENABLE_THINKING:-false}
    volumes:
      - council_transcripts:/app/council_mcp_server/transcripts
      - council_decision_graph:/app/council_mcp_server/decision_graph_data
    restart: unless-stopped

volumes:
  backend_data:
  council_transcripts:
  council_decision_graph:
